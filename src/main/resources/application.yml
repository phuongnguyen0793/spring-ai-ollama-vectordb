spring:
  ai:
    ollama:
      base-url: http://localhost:11434
      embedding:
        options:
          model: nomic-embed-text
      chat:
        options:
          model: llama3.2
    vectorstore:
      opensearch:
        uris: http://localhost:9200
        index-name: purposes
        initialize-schema: true

app:
  search:
    default-top-k: 5
    default-threshold: 0.5

server:
  port: 8080

logging:
  level:
    root: INFO
    org.springframework.ai: DEBUG
